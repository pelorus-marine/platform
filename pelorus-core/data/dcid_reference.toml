# Pelorus Core — wire DCID → semantic [`Dcid`] lanes (reference map).
#
# `wire` is the Pelorus numeric DCID from **03** §3.2 (`derive_dcid` / `dcid_from_extended_id`),
# i.e. source address is NOT included.
#
# Rebuild: `cargo build -p pelorus-core` regenerates `OUT_DIR/pelorus_dcid_reference.rs`.
# Indexed variants use "Variant:index" (e.g. J1939 EEC1 uses engine instance 0 as template).

version = 1

[[map]]
# 07 §1 — Wake-Up Frame
wire = "0x0FF80"
signals = ["PelorusWakeUpFrame"]

[[map]]
# 07 §1 — Network Management
wire = "0x0FF81"
signals = ["PelorusNetworkManagement"]

[[map]]
# J1939 PGN 61444 — Electronic Engine Controller 1 (**06** / catalog); template instance 0.
wire = "0x0F004"
signals = ["EngineRpm:0"]
