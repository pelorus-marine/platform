# Layout mirrors <https://github.com/pelorus-marine/ecdis/.github/workflows/ci.yml>:
# checkout → pinned toolchain → test / clippy / fmt / doc. No ECDIS/UI system deps here.
#
# Use `dtolnay/rust-toolchain@master` + `toolchain` input so optional `components`
# (rustfmt, clippy) install correctly for the pinned MSRV.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (workspace, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - run: cargo test --workspace --all-features --verbose

  pelorus-core-canbus:
    name: Pelorus Core (canbus + alloc, no defaults)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - run: cargo check -p pelorus-core --no-default-features --features canbus,alloc --verbose

  clippy:
    name: Clippy (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Docs (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features
