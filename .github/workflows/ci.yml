# Layout mirrors <https://github.com/pelorus-marine/ecdis/.github/workflows/ci.yml>:
# checkout → pinned toolchain → test / clippy / fmt / doc.
#
# `pelorus-inspector` pulls in Tauri: Linux runners need GTK/WebKit packages and a
# minimal `pelorus-inspector/dist/index.html` so `build.rs` and `cargo test` compile.
#
# Use `dtolnay/rust-toolchain@master` + `toolchain` input so optional `components`
# (rustfmt, clippy) install correctly for the pinned toolchain.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (workspace, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux packages for Pelorus Inspector (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Minimal dist for Pelorus Inspector build.rs
        run: |
          mkdir -p pelorus-inspector/dist
          printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body></body></html>' > pelorus-inspector/dist/index.html

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - run: cargo test --workspace --all-features --verbose

  pelorus-core-canbus:
    name: Pelorus Core (canbus + alloc, no defaults)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux packages for Pelorus Inspector (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Minimal dist for Pelorus Inspector build.rs
        run: |
          mkdir -p pelorus-inspector/dist
          printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body></body></html>' > pelorus-inspector/dist/index.html

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - run: cargo check -p pelorus-core --no-default-features --features canbus,alloc --verbose

  clippy:
    name: Clippy (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux packages for Pelorus Inspector (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Minimal dist for Pelorus Inspector build.rs
        run: |
          mkdir -p pelorus-inspector/dist
          printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body></body></html>' > pelorus-inspector/dist/index.html

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Docs (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux packages for Pelorus Inspector (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Minimal dist for Pelorus Inspector build.rs
        run: |
          mkdir -p pelorus-inspector/dist
          printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body></body></html>' > pelorus-inspector/dist/index.html

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

  pelorus-inspector-frontend:
    name: Pelorus Inspector (npm lint + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pelorus-inspector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pelorus-inspector/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npx tsc --noEmit
      - run: npm run build
