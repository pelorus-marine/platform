# Layout mirrors <https://github.com/pelorus-marine/ecdis/.github/workflows/ci.yml>:
# checkout → pinned toolchain → test / clippy / fmt / doc.
#
# `pelorus-inspector` pulls in Tauri: Linux runners need GTK/WebKit packages and a
# minimal `pelorus-inspector/dist/index.html` so `build.rs` and `cargo test` compile.
# Shared setup: `scripts/ci-setup-inspector-linux.sh`
#
# Use `dtolnay/rust-toolchain@master` + `toolchain` input so optional `components`
# (rustfmt, clippy) install correctly for the pinned toolchain.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  test:
    name: Test (workspace, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux + Inspector dist (full workspace)
        run: bash scripts/ci-setup-inspector-linux.sh

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: cargo test --workspace --all-features --verbose

  pelorus-core-canbus:
    name: Pelorus Core (canbus / canbus_heapless, no defaults)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - run: cargo check -p pelorus-core --no-default-features --features canbus,alloc --verbose

      - run: cargo check -p pelorus-core --no-default-features --features canbus_heapless --verbose

  dbc-rs-heapless:
    name: dbc-rs + pelorus-bounded (heapless, no alloc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - run: cargo check -p pelorus-bounded --no-default-features --features heapless --verbose

      - run: cargo check -p dbc-rs --no-default-features --features heapless,attributes --verbose

  clippy:
    name: Clippy (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux + Inspector dist (full workspace)
        run: bash scripts/ci-setup-inspector-linux.sh

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Docs (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux + Inspector dist (full workspace)
        run: bash scripts/ci-setup-inspector-linux.sh

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

  pelorus-inspector-frontend:
    name: Pelorus Inspector (npm lint + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pelorus-inspector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pelorus-inspector/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npx tsc --noEmit
      - run: npm run build
